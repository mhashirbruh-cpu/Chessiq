<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria Engine</title>

<style>
  body {
    margin: 0;
    background: #0b0e17;
    overflow: hidden;
    font-family: sans-serif;
  }

  #puppet-3d {
    width: 100vw;
    height: 100vh;
  }

  #status {
    position: fixed;
    top: 10px;
    left: 10px;
    color: #00ff88;
    background: rgba(0,0,0,0.6);
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 6px;
    z-index: 10;
  }
</style>
</head>

<body>

<div id="status">Starting...</div>
<div id="puppet-3d"></div>

<!-- ✅ FIX 1: Use module imports (THIS IS THE REAL FIX) -->
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

const status = document.getElementById("status");

let model, headBoneRef, leftEyeRef, rightEyeRef;
let gazeTarget = new THREE.Vector3(0, 1.5, 2);

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0e17);

// Camera (closer = IMPORTANT FIX)
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.3, 2);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(1);
document.getElementById('puppet-3d').appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(3,5,3);
scene.add(light);

// Eye Generator
function createEye() {
  const group = new THREE.Group();

  const white = new THREE.Mesh(
    new THREE.SphereGeometry(0.03, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  white.scale.set(1,1.2,0.5);
  group.add(white);

  const iris = new THREE.Mesh(
    new THREE.CircleGeometry(0.018, 16),
    new THREE.MeshBasicMaterial({ color: 0x3366ff })
  );
  iris.position.z = 0.02;
  group.add(iris);

  return group;
}

// Loader
const loader = new GLTFLoader();

status.innerText = "Loading aria.glb...";

loader.load(
  './aria.glb',
  (gltf) => {
    model = gltf.scene;
    scene.add(model);

    status.innerText = "Aria Loaded ✅";

    // Find head bone
    let headBone = null;
    model.traverse(n => {
      if (n.isBone && !headBone) {
        const name = n.name.toLowerCase();
        if (name.includes("head") || name.includes("neck")) {
          headBone = n;
        }
      }
    });

    // Create eyes
    leftEyeRef = createEye();
    rightEyeRef = createEye();

    if (headBone) {
      headBone.add(leftEyeRef);
      headBone.add(rightEyeRef);

      leftEyeRef.position.set(-0.06, 0.1, 0.08);
      rightEyeRef.position.set(0.06, 0.1, 0.08);

      headBoneRef = headBone;
    } else {
      model.add(leftEyeRef);
      model.add(rightEyeRef);
    }
  },
  undefined,
  (err) => {
    status.style.color = "red";
    status.innerText = "LOAD ERROR ❌";
    console.error(err);
  }
);

// Animation
function animate() {
  requestAnimationFrame(animate);

  if (model) {
    model.rotation.y = Math.sin(Date.now() * 0.001) * 0.03;
  }

  if (leftEyeRef && rightEyeRef) {
    leftEyeRef.lookAt(gazeTarget);
    rightEyeRef.lookAt(gazeTarget);
  }

  renderer.render(scene, camera);
}
animate();

// Resize fix
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Touch interaction
window.addEventListener('touchmove', e => {
  const t = e.touches[0];
  gazeTarget.x = (t.clientX / window.innerWidth - 0.5) * 2;
  gazeTarget.y = 1.5 - (t.clientY / window.innerHeight - 0.5) * 2;
});
</script>

</body>
</html>
