<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aria — Chess Companion</title>
<script>
function saveKey(){
  try {
    var v=document.getElementById('api-key-input').value.trim();
    if(!v){alert('Enter your Groq key (gsk_...)');return;}
    try{ localStorage.setItem('aria_groq_key',v); }catch(e){}
    document.getElementById('key-modal').style.display='none';
    try{ document.getElementById('status-txt').textContent='Aria is awake!'; }catch(e){}
  } catch(e){ alert('Error: '+e.message); }
}
// Safe localStorage read
var _storedKey='';
try{ _storedKey=localStorage.getItem('aria_groq_key')||''; }catch(e){}
</script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
body{
  height:100%;height:100dvh;
  overflow:hidden;
  background:#0d0a1a;
  font-family:'Outfit',sans-serif;
  min-height:-webkit-fill-available;
}

/* ── BACKGROUND ── */
#bg{
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 80% 70% at 50% 30%, #1a0f3a 0%, #0d0a1a 60%, #080612 100%);
}
#bg::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 40% at 50% 60%, rgba(124,111,255,0.08) 0%, transparent 70%);
}

/* ── ARIA SCENE ── */
#scene{
  position:fixed;
  top:60px;left:0;right:0;bottom:90px;
  z-index:1;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  overflow:hidden;
}

#aria-body{
  position:relative;
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
}

/* ── ARIA SVG ROBOT ── */
#aria-svg{
  width:min(75vw,340px);
  height:auto;
  filter:drop-shadow(0 0 30px rgba(200,180,255,0.25)) drop-shadow(0 0 60px rgba(124,111,255,0.15));
}

/* Glow ring beneath Aria */
#aria-glow{
  position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);
  width:200px;height:40px;
  background:radial-gradient(ellipse, rgba(124,111,255,0.3) 0%, transparent 70%);
  animation:glow-pulse 3s ease-in-out infinite;
}
@keyframes glow-pulse{
  0%,100%{opacity:0.6;transform:translateX(-50%) scaleX(1)}
  50%{opacity:1;transform:translateX(-50%) scaleX(1.15)}
}

/* ── TOP BAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:10;
  padding:14px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(13,10,26,0.9) 0%,transparent 100%);
}
.logo-txt{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.5px}
.logo-txt em{color:#a89fff;font-style:normal}
.top-actions{display:flex;gap:8px}
.top-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.7);font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.top-btn:hover,.top-btn.active{background:rgba(124,111,255,0.3);border-color:rgba(124,111,255,0.5);color:#fff}

/* ── STATUS INDICATOR ── */
#status-bar{
  position:fixed;top:64px;left:50%;transform:translateX(-50%);
  z-index:10;
  background:rgba(0,0,0,0.4);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;padding:5px 14px;
  display:flex;align-items:center;gap:7px;
  font-size:12px;color:rgba(255,255,255,0.6);
  transition:all .3s;
}
#status-dot{
  width:7px;height:7px;border-radius:50%;background:#4caf50;
  animation:pulse-g 2.5s infinite;
}
#status-dot.thinking{background:#7c6fff;animation:pulse-p .7s infinite}
#status-dot.listening{background:#ff4757;animation:pulse-r .5s infinite}
@keyframes pulse-g{0%,100%{box-shadow:0 0 0 0 rgba(76,175,80,.5)}60%{box-shadow:0 0 0 4px rgba(76,175,80,0)}}
@keyframes pulse-p{0%,100%{box-shadow:0 0 0 0 rgba(124,111,255,.7)}50%{box-shadow:0 0 0 5px rgba(124,111,255,0)}}
@keyframes pulse-r{0%,100%{box-shadow:0 0 0 0 rgba(255,71,87,.7)}50%{box-shadow:0 0 0 5px rgba(255,71,87,0)}}

/* ── USER MESSAGE CLOUD ── */
#msg-cloud{
  position:fixed;
  left:16px;right:16px;
  bottom:120px;
  z-index:20;
  background:rgba(20,16,40,0.65);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:18px 20px;
  font-size:22px;
  font-weight:600;
  color:#fff;
  line-height:1.4;
  opacity:0;
  transform:translateY(20px);
  transition:opacity .35s ease, transform .35s ease;
  pointer-events:none;
  max-height:45vh;
  overflow-y:auto;
}
#msg-cloud.show{opacity:1;transform:translateY(0)}
#msg-cloud.fade{opacity:0;transform:translateY(-10px)}

/* ── PGN PANEL (slide up) ── */
#pgn-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:rgba(13,10,26,0.97);backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.1);
  border-radius:20px 20px 0 0;
  padding:20px 16px 34px;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(0.34,1.56,0.64,1);
}
#pgn-panel.open{transform:translateY(0)}
.panel-handle{
  width:40px;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.2);
  margin:0 auto 16px;
}
.panel-title{font-size:14px;font-weight:700;color:rgba(255,255,255,0.7);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.panel-tabs{display:flex;gap:6px;margin-bottom:12px}
.ptab{
  flex:1;padding:8px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);
  background:transparent;color:rgba(255,255,255,0.4);
  font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s;
}
.ptab.active{background:rgba(124,111,255,0.2);border-color:rgba(124,111,255,0.4);color:#a89fff}
.tab-content{display:none}.tab-content.active{display:block}
textarea{
  width:100%;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);border-radius:12px;
  padding:12px;color:#fff;font-family:monospace;font-size:11px;
  resize:none;outline:none;min-height:80px;line-height:1.5;
}
textarea:focus{border-color:rgba(124,111,255,0.5)}
textarea::placeholder{color:rgba(255,255,255,0.2)}
.panel-btns{display:flex;gap:8px;margin-top:10px}
.p-btn{
  flex:1;padding:11px;border-radius:12px;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;transition:all .2s;
}
.p-btn-primary{background:linear-gradient(135deg,#7c6fff,#9d8fff);color:#fff}
.p-btn-primary:hover{background:linear-gradient(135deg,#9d8fff,#b8a8ff)}
.p-btn-ghost{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5)}
.photo-drop{
  border:2px dashed rgba(255,255,255,0.15);border-radius:14px;
  padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(255,255,255,0.03);
}
.photo-drop:hover{border-color:rgba(124,111,255,0.5);background:rgba(124,111,255,0.05)}
.photo-drop p{font-size:13px;color:rgba(255,255,255,0.4);margin-top:8px}
#photo-preview-wrap{display:none;margin-top:10px;position:relative}
#photo-preview{width:100%;max-height:140px;object-fit:contain;border-radius:10px;border:1px solid rgba(255,255,255,0.1)}
.remove-photo{
  position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.7);
  border:none;color:#fff;border-radius:50%;width:26px;height:26px;
  cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
}
#game-badge{
  display:none;background:rgba(124,111,255,0.15);border:1px solid rgba(124,111,255,0.3);
  border-radius:10px;padding:8px 12px;margin-bottom:10px;
  font-size:11px;color:#a89fff;display:flex;align-items:center;justify-content:space-between;
}
#game-badge.show{display:flex}
#file-input{display:none}

/* ── BOTTOM BAR ── */
#bottombar{
  position:fixed;bottom:0;left:0;right:0;z-index:15;
  padding:12px 16px 28px;
  background:linear-gradient(to top,rgba(13,10,26,0.95) 0%,transparent 100%);
  display:flex;align-items:center;gap:10px;
}
.bot-btn{
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.12);
  color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;flex-shrink:0;
}
.bot-btn:hover{background:rgba(124,111,255,0.25);border-color:rgba(124,111,255,0.4)}
.bot-btn.mic-active{
  background:rgba(255,71,87,0.2);border-color:rgba(255,71,87,0.5);
  animation:mic-ring .8s infinite;
}
@keyframes mic-ring{
  0%,100%{box-shadow:0 0 0 0 rgba(255,71,87,0.4)}
  50%{box-shadow:0 0 0 8px rgba(255,71,87,0)}
}
.text-input-wrap{
  flex:1;display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.07);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:28px;padding:8px 8px 8px 16px;
}
#chat-input{
  flex:1;background:transparent;border:none;outline:none;
  color:#fff;font-family:'Outfit',sans-serif;font-size:14px;
  min-height:36px;max-height:80px;resize:none;line-height:1.4;
}
#chat-input::placeholder{color:rgba(255,255,255,0.25)}
#send-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#7c6fff,#9d8fff);color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;transition:all .2s;
}
#send-btn:disabled{background:rgba(255,255,255,0.1);cursor:not-allowed}
#send-btn:hover:not(:disabled){background:linear-gradient(135deg,#9d8fff,#b8a8ff);transform:scale(1.05)}

/* ── WAVE ANIMATION (listening) ── */
#wave-bars{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  z-index:20;display:none;align-items:flex-end;gap:4px;height:32px;
}
#wave-bars.show{display:flex}
#wave-bars span{
  width:4px;border-radius:2px;background:#7c6fff;
  animation:wave-bar 0.8s ease-in-out infinite;
}
#wave-bars span:nth-child(1){height:8px;animation-delay:0s}
#wave-bars span:nth-child(2){height:18px;animation-delay:0.1s}
#wave-bars span:nth-child(3){height:28px;animation-delay:0.2s}
#wave-bars span:nth-child(4){height:18px;animation-delay:0.3s}
#wave-bars span:nth-child(5){height:8px;animation-delay:0.4s}
@keyframes wave-bar{
  0%,100%{transform:scaleY(0.4);opacity:0.5}
  50%{transform:scaleY(1.2);opacity:1}
}

/* ── API KEY MODAL ── */
#key-modal.hidden{display:none}
#key-modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.92);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;
}
#key-modal.hidden{display:none}
.modal-box{
  background:rgba(20,16,40,0.98);border:1px solid rgba(124,111,255,0.3);
  border-radius:22px;padding:30px 22px;max-width:340px;width:100%;
  backdrop-filter:blur(20px);
}
.modal-box h2{font-size:24px;font-weight:800;color:#a89fff;margin-bottom:8px;text-align:center}
.modal-box p{font-size:13px;color:rgba(255,255,255,0.4);line-height:1.65;margin-bottom:18px;text-align:center}
.modal-box input{
  width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  color:#fff;border-radius:12px;padding:13px;
  font-family:monospace;font-size:12px;outline:none;margin-bottom:12px;
}
.modal-box input:focus{border-color:rgba(124,111,255,0.5)}
.modal-box .save-btn{
  width:100%;background:linear-gradient(135deg,#7c6fff,#9d8fff);color:#fff;
  border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;
}
.modal-box .save-btn:hover{background:linear-gradient(135deg,#9d8fff,#b8a8ff)}
.modal-note{font-size:11px;color:rgba(255,255,255,0.25);text-align:center;margin-top:10px}

/* ── NOTIF ── */
.notif{
  position:fixed;top:110px;left:50%;transform:translateX(-50%) translateY(-10px);
  background:rgba(20,16,40,0.9);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);border-radius:12px;
  padding:9px 18px;font-size:13px;color:#fff;z-index:99;
  opacity:0;transition:all .3s;white-space:nowrap;
}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0)}
.notif.ok{border-color:rgba(79,255,176,0.4);color:#4fffb0}
.notif.err{border-color:rgba(255,71,87,0.4);color:#ff4757}
.notif.info{border-color:rgba(124,111,255,0.4);color:#a89fff}
</style>
</head>
<body>

<!-- Background -->
<div id="bg"></div>

<!-- API Key Modal -->
<div id="key-modal">
  <div class="modal-box">
    <div style="font-size:44px;text-align:center;margin-bottom:14px">🤖</div>
    <h2>Meet Aria</h2>
    <p>Your chess companion. Enter your free Groq API key to wake her up.</p>
    <input type="text" id="api-key-input" placeholder="gsk_..." autocomplete="off"/>
    <button class="save-btn" onclick="saveKey()">Wake Up Aria →</button>
    <p class="modal-note">🔒 Stored locally · Get yours free at groq.com</p>
  </div>
</div>

<!-- Top Bar -->
<div id="topbar">
  <div class="logo-txt">♞ Chess<em>IQ</em></div>
  <div class="top-actions">
    <button class="top-btn" id="voice-btn" title="Voice mode" onclick="toggleVoice()">🔊</button>
    <button class="top-btn" title="Load PGN / Photo" onclick="togglePanel()">♟</button>
    <button class="top-btn" title="API Key" onclick="changeKey()">🔑</button>
    <button class="top-btn" title="Clear" onclick="clearChat()">🗑</button>
  </div>
</div>

<!-- Status -->
<div id="status-bar">
  <div id="status-dot"></div>
  <span id="status-txt">Aria is ready</span>
</div>


<!-- Aria Scene — Real Image with Green Screen Removal -->
<div id="scene">
  <div id="aria-body">
    <div id="aria-glow"></div>
    <div id="aria-module">
      <style>
        #aria-module{position:relative;width:min(75vw,340px);height:100%;margin:0 auto;overflow:hidden;display:flex;justify-content:center;align-items:center;}
        #aria-container{position:relative;width:100%;height:100%;transform-origin:bottom center;animation:ariaBreathe 4s ease-in-out infinite;}
        #aria-sway-wrapper{position:absolute;top:0;left:0;width:100%;height:100%;transform-origin:center 70%;animation:ariaSway 6s ease-in-out infinite alternate;}
        #aria-img{width:100%;height:100%;object-fit:contain;object-position:center bottom;}
        @keyframes ariaBreathe{0%,100%{transform:scaleY(1) translateY(0)}50%{transform:scaleY(1.015) translateY(-1%)}}
        @keyframes ariaSway{0%{transform:rotate(-0.5deg)}100%{transform:rotate(0.5deg)}}
        #aria-eyes{position:absolute;top:24.5%;left:41%;width:18%;height:3%;background-color:#e8c4a0;border-radius:50%;opacity:0;z-index:10;animation:ariaBlink 4.5s infinite;}
        @keyframes ariaBlink{0%,94%,100%{opacity:0;transform:scaleY(0)}96%{opacity:1;transform:scaleY(1.2)}98%{opacity:1;transform:scaleY(1.2)}}
        #aria-mouth{position:absolute;top:31.5%;left:48.5%;width:3%;height:1.5%;background-color:#3b1b1b;border-radius:50%;opacity:0;z-index:10;transition:opacity 0.1s;}
        .aria-speaking{opacity:1!important;animation:ariaTalk 0.15s infinite alternate;}
        @keyframes ariaTalk{0%{transform:scaleY(0.4) scaleX(0.8)}100%{transform:scaleY(1.2) scaleX(1.1)}}
      </style>
      <div id="aria-container">
        <div id="aria-sway-wrapper">
          <img id="aria-img" src="https://mhashirbruh-cpu.github.io/Chessiq/aria.png" alt="Aria"/>
          <div id="aria-eyes"></div>
          <div id="aria-mouth"></div>
        </div>
      </div>
      <script>
        window.speakAnim=function(on){
          const m=document.getElementById('aria-mouth');
          if(m) on?m.classList.add('aria-speaking'):m.classList.remove('aria-speaking');
        };
      </script>
    </div>
  </div>
</div>
<!-- Wave bars (listening indicator) -->
<div id="wave-bars">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- User message cloud -->
<div id="msg-cloud"></div>

<!-- PGN / Photo Panel -->
<div id="pgn-panel">
  <div class="panel-handle"></div>
  <div class="panel-title">Load a Game</div>
  <div id="game-badge" class="show" style="display:none">
    <span id="game-badge-txt">No game loaded</span>
    <button onclick="clearGame()" style="background:none;border:none;color:#ff4757;cursor:pointer;font-size:11px;font-family:'Outfit',sans-serif;font-weight:700">× Clear</button>
  </div>
  <div class="panel-tabs">
    <button class="ptab active" onclick="switchPTab('pgn')">📋 PGN</button>
    <button class="ptab" onclick="switchPTab('photo')">📷 Photo</button>
  </div>
  <div class="tab-content active" id="ptab-pgn">
    <textarea id="pgn-input" placeholder="Paste your PGN from Chessis here..." rows="4"></textarea>
    <div class="panel-btns">
      <button class="p-btn p-btn-primary" onclick="loadPGN()" id="analyze-btn">▶ Load Game</button>
      <button class="p-btn p-btn-ghost" onclick="document.getElementById('pgn-input').value=''">Clear</button>
    </div>
  </div>
  <div class="tab-content" id="ptab-photo">
    <div class="photo-drop" onclick="document.getElementById('file-input').click()">
      <div style="font-size:32px">📷</div>
      <p>Tap to take photo or upload board</p>
    </div>
    <input type="file" id="file-input" accept="image/*" capture="environment" onchange="handlePhoto(event)"/>
    <div id="photo-preview-wrap">
      <img id="photo-preview" src="" alt="Board"/>
      <button class="remove-photo" onclick="removePhoto()">×</button>
      <button class="p-btn p-btn-primary" style="width:100%;margin-top:8px" onclick="sendPhoto()" id="photo-send-btn">Send to Aria →</button>
    </div>
  </div>
</div>

<!-- Bottom Bar -->
<div id="bottombar">
  <button class="bot-btn" id="mic-btn" onclick="toggleMic()" title="Speak to Aria">🎤</button>
  <div class="text-input-wrap">
    <textarea id="chat-input" placeholder="Ask Aria…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
// ── CONFIG ──
const GROQ_URL = 'https://api.groq.com/openai/v1/chat/completions';
const GROQ_MODEL = 'llama-3.3-70b-versatile';

// ── STATE ──
let API_KEY = localStorage.getItem('aria_groq_key') || '';
let chatHistory = [];
let gameData = null;
let pendingPhoto = null;
let voiceOn = true;
let voiceLoopActive = false;
let sfWorker = null;
let sfReady = false;
let panelOpen = false;
let msgCloudTimer = null;
let isSpeaking = false;

// ── SAVE KEY — must be defined immediately, before anything else ──
function saveKey() {
  try {
    const input = document.getElementById('api-key-input');
    const v = input ? input.value.trim() : '';
    if (!v) { alert('Please enter your Groq API key (starts with gsk_)'); return; }
    API_KEY = v;
    localStorage.setItem('aria_groq_key', v);
    const modal = document.getElementById('key-modal');
    if (modal) modal.classList.add('hidden');
    setTimeout(() => showNotif('Aria is awake! 🤖', 'ok'), 100);
  } catch(err) {
    alert('Error saving key: ' + err.message);
  }
}

function changeKey() {
  const input = document.getElementById('api-key-input');
  if (input) input.value = API_KEY;
  const modal = document.getElementById('key-modal');
  if (modal) modal.classList.remove('hidden');
}

// ── INIT ──
window.addEventListener('load', () => {
  const wakeBtn = document.getElementById('wake-btn');
  if (wakeBtn) wakeBtn.addEventListener('click', saveKey);
  if (API_KEY) {
    const modal = document.getElementById('key-modal');
    if (modal) modal.classList.add('hidden');
  }
  initStockfish();
  loadVoices();
  startBlinkLoop();
  updateVoiceBtn();
});

// ── STOCKFISH ──
function initStockfish() {
  try {
    sfWorker = new Worker('stockfish.js');
    sfWorker.onmessage = e => {
      if (e.data === 'uciok' || e.data === 'readyok') sfReady = true;
    };
    sfWorker.postMessage('uci');
    sfWorker.postMessage('isready');
  } catch(e) { console.warn('Stockfish:', e); }
}

function sfEval(fen, depth=15) {
  return new Promise(resolve => {
    if (!sfWorker || !sfReady) { resolve(null); return; }
    let bestMove=null, score=null, lines=[];
    const timeout = setTimeout(() => resolve({bestMove,score,lines}), 4000);
    sfWorker.onmessage = e => {
      const d = e.data;
      if (d.startsWith('info depth')) {
        const sm = d.match(/score (cp|mate) (-?\d+)/);
        const pm = d.match(/pv (.+)/);
        if (sm) score = sm[1]==='cp' ? (parseInt(sm[2])/100).toFixed(2) : 'M'+sm[2];
        if (pm && lines.length < 3) lines.push(pm[1].split(' ').slice(0,5).join(' '));
      }
      if (d.startsWith('bestmove')) {
        bestMove = d.split(' ')[1];
        clearTimeout(timeout);
        resolve({bestMove, score, lines:[...new Set(lines)]});
      }
    };
    sfWorker.postMessage('position fen ' + fen);
    sfWorker.postMessage('go depth ' + depth);
  });
}

// ── PANEL ──

}

// ── PGN ──
async function loadPGN() {
  const pgn = document.getElementById('pgn-input').value.trim();
  if (!pgn) { showNotif('Paste a PGN first', 'err'); return; }
  const btn = document.getElementById('analyze-btn');
  btn.disabled=true; btn.textContent='⏳ Loading…';

  // Load Chess.js lazily if not already loaded
  if (typeof Chess === 'undefined') {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js';
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    }).catch(() => {});
  }
  try {
    const chess = new Chess();
    if (!chess.load_pgn(pgn)) throw new Error('Invalid PGN');
    const history = chess.history({verbose:true});
    const headers = chess.header();
    const moves = [];
    const replay = new Chess();
    for (const move of history) {
      replay.move(move.san);
      moves.push({san:move.san, fen:replay.fen()});
    }
    gameData = {pgn, headers, moves, totalMoves:moves.length};
    const white=headers.White||'White', black=headers.Black||'Black', result=headers.Result||'?';
    const badge = document.getElementById('game-badge');
    document.getElementById('game-badge-txt').textContent = `${white} vs ${black} · ${moves.length} moves`;
    badge.style.display='flex';
    const summary = `[Game loaded] White:${white} Black:${black} Result:${result} Moves:${moves.length}\n${moves.map((m,i)=>i%2===0?Math.floor(i/2+1)+'.'+m.san:m.san).join(' ')}`;
    chatHistory.push({role:'system', content:summary});
    showUserCloud(`Game loaded! ${white} vs ${black}`);
    setStatus('Game loaded — ask me anything', 'ok');
    togglePanel();
    showNotif('Game loaded ✓', 'ok');
  } catch(e) { showNotif('Invalid PGN — check it again', 'err'); }
  btn.disabled=false; btn.textContent='▶ Load Game';
}

function clearGame() {
  gameData=null;
  document.getElementById('game-badge').style.display='none';
  document.getElementById('pgn-input').value='';
  chatHistory = chatHistory.filter(m=>m.role!=='system');
  showNotif('Game cleared','info');
}

// ── PHOTO ──
function handlePhoto(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const url=ev.target.result;
    pendingPhoto={b64:url.split(',')[1], type:file.type||'image/jpeg', url};
    document.getElementById('photo-preview').src=url;
    document.getElementById('photo-preview-wrap').style.display='block';
  };
  reader.readAsDataURL(file);
  e.target.value='';
}
function removePhoto() {
  pendingPhoto=null;
  document.getElementById('photo-preview-wrap').style.display='none';
}
async function sendPhoto() {
  if(!pendingPhoto) return;
  if(!API_KEY){ document.getElementById('key-modal').classList.remove('hidden'); return; }
  const btn=document.getElementById('photo-send-btn');
  btn.disabled=true; btn.textContent='⏳ Analyzing…';
  showUserCloud('📷 Sending board photo…');
  setStatus('Aria is reading the board…','thinking');
  togglePanel();
  try {
    const messages=buildMessages([{
      role:'user',
      content:[
        {type:'image_url', image_url:{url:`data:${pendingPhoto.type};base64,${pendingPhoto.b64}`}},
        {type:'text', text:'This is a chess board position. Analyze it — identify all pieces, evaluate the position, give the best move and explain why.'}
      ]
    }]);
    const res=await fetch(GROQ_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
      body:JSON.stringify({model:'llama-3.2-11b-vision-preview', messages, max_tokens:1024, temperature:0.7})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    const reply=data.choices[0].message.content;
    chatHistory.push({role:'assistant', content:reply});
    setStatus('Aria is ready','ok');
    if(voiceOn) speak(reply);
  } catch(e) {
    setStatus('Something went wrong','err');
    speak("I had trouble reading that image. Try describing the position to me instead.");
  }
  btn.disabled=false; btn.textContent='Send to Aria →';
  removePhoto();
}

// ── CHAT ──
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,80)+'px'; }

let audioUnlocked=false;
function unlockAudio() {
  if(audioUnlocked) return;
  const u=new SpeechSynthesisUtterance('');
  window.speechSynthesis.speak(u);
  audioUnlocked=true;
}

async function sendMessage() {
  unlockAudio();
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if(!text) return;
  if(!API_KEY){ document.getElementById('key-modal').classList.remove('hidden'); return; }
  document.getElementById('send-btn').disabled=true;
  input.value=''; input.style.height='auto';

  // Show user's message as floating cloud
  showUserCloud(text);
  chatHistory.push({role:'user', content:text});
  setStatus('Aria is thinking…','thinking');

  // Stockfish eval
  let sfContext='';
  if(gameData && sfReady) {
    const dot=document.getElementById('status-dot');
    dot.classList.add('thinking');
    const moveNumMatch=text.match(/move\s*(\d+)|(\d+)(?:th|st|nd|rd)/i);
    let targetIdx=gameData.moves.length-1;
    if(moveNumMatch){
      const num=parseInt(moveNumMatch[1]||moveNumMatch[2]);
      targetIdx=(num-1)*2+(text.toLowerCase().includes('black')?1:0);
      targetIdx=Math.min(Math.max(targetIdx,0),gameData.moves.length-1);
    }
    if(gameData.moves[targetIdx]){
      const sf=await sfEval(gameData.moves[targetIdx].fen,15);
      if(sf){
        const ref=moveNumMatch?`move ${Math.floor(targetIdx/2)+1}`:'current position';
        sfContext=`\n[Stockfish for ${ref}: eval=${sf.score}, best=${sf.bestMove}, lines: ${sf.lines.slice(0,2).join(' | ')}]`;
      }
    }
  }

  // Trim history
  if(chatHistory.filter(m=>m.role!=='system').length>20){
    const sys=chatHistory.filter(m=>m.role==='system');
    const convo=chatHistory.filter(m=>m.role!=='system');
    chatHistory=[...sys,...convo.slice(-15)];
  }

  const userWithCtx=sfContext?text+sfContext:text;
  const msgs=buildMessages(null,userWithCtx);

  try {
    const res=await fetch(GROQ_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
      body:JSON.stringify({model:GROQ_MODEL, messages:msgs, max_tokens:1024, temperature:0.75})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    const reply=data.choices[0].message.content;
    chatHistory.push({role:'assistant', content:reply});
    setStatus('Aria is ready','ok');
    if(voiceOn) speak(reply);
    else setStatus('Tap 🔊 to hear Aria','info');
  } catch(e) {
    setStatus('Something went wrong','err');
    speak("Something went wrong. Please check your connection and try again.");
  }
  document.getElementById('send-btn').disabled=false;
}

function buildMessages(extra, latestText) {
  const sys={role:'system',content:`You are Aria, a warm and deeply knowledgeable chess companion. Grandmaster-level knowledge, calm sensei patience.

Personality: warm, wise, encouraging. Explain WHY behind every move. Talk about plans, patterns, ideas. Conversational like a brilliant friend.

CRITICAL: Always use standard algebraic notation: e4, Nf3, Rxd5, O-O. NEVER "Knight to f3". Keep responses concise and conversational — you are speaking out loud, not writing an essay. 2-4 sentences max per point. Reference Stockfish data in [brackets] when provided.`};
  const msgs=[sys];
  const gameSys=chatHistory.find(m=>m.role==='system');
  if(gameSys) msgs.push({role:'user',content:gameSys.content});
  const convo=chatHistory.filter(m=>m.role!=='system');
  if(extra){ msgs.push(...convo,...extra); }
  else if(latestText){ msgs.push(...convo.slice(0,-1),{role:'user',content:latestText}); }
  return msgs;
}

// ── MESSAGE CLOUD ──
function showUserCloud(text) {
  const cloud=document.getElementById('msg-cloud');
  clearTimeout(msgCloudTimer);
  cloud.classList.remove('fade','show');
  cloud.textContent=text;
  void cloud.offsetWidth;
  cloud.classList.add('show');
  // Auto-fade after reading time
  const readTime=Math.max(3000, text.length*60);
  msgCloudTimer=setTimeout(()=>{
    cloud.classList.add('fade');
    setTimeout(()=>cloud.classList.remove('show','fade'),400);
  }, readTime);
}

// ── STATUS ──
function setStatus(txt, type='ok') {
  document.getElementById('status-txt').textContent=txt;
  const dot=document.getElementById('status-dot');
  dot.className='';
  if(type==='thinking') dot.classList.add('thinking');
  else if(type==='listening') dot.classList.add('listening');
}

// ── EYE BLINK LOOP ──
function startBlinkLoop() {
  function blink() {
    const lidL=document.getElementById('lid-left');
    const lidR=document.getElementById('lid-right');
    if(!lidL||!lidR) return;
    // Close
    lidL.setAttribute('ry','13');
    lidR.setAttribute('ry','13');
    setTimeout(()=>{
      lidL.setAttribute('ry','0');
      lidR.setAttribute('ry','0');
    },120);
    // Schedule next blink
    setTimeout(blink, 2500+Math.random()*3000);
  }
  setTimeout(blink, 1500);
}

// ── MOUTH ANIMATION ──
function startMouthAnim() {
  isSpeaking=true;
  animMouth();
}
function stopMouthAnim() {
  isSpeaking=false;
  const mc=document.getElementById('mouth-closed');
  const mot=document.getElementById('mouth-open-top');
  const mob=document.getElementById('mouth-open-bottom');
  if(mc) mc.setAttribute('opacity','1');
  if(mot) mot.setAttribute('opacity','0');
  if(mob){ mob.setAttribute('ry','0'); mob.setAttribute('opacity','0'); }
}
function animMouth() {
  if(!isSpeaking) return;
  const mob=document.getElementById('mouth-open-bottom');
  const mc=document.getElementById('mouth-closed');
  const mot=document.getElementById('mouth-open-top');
  if(!mob) return;
  const open=Math.random()>0.4;
  const ry=open?(3+Math.random()*5):0;
  mob.setAttribute('ry',ry.toFixed(1));
  mob.setAttribute('opacity',open?'1':'0');
  if(mc) mc.setAttribute('opacity',open?'0':'1');
  if(mot) mot.setAttribute('opacity',open?'1':'0');
  setTimeout(animMouth, 80+Math.random()*120);
}

// ── VOICE ──
let voices=[];
let voiceLoopActive=false;
function loadVoices(){
  voices=speechSynthesis.getVoices();
  if(!voices.length) speechSynthesis.onvoiceschanged=()=>{voices=speechSynthesis.getVoices();};
}

function speak(text) {
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const clean=text.replace(/<[^>]+>/g,'').replace(/\*\*/g,'').replace(/\s+/g,' ').trim();
  const snippet=clean.length>600?clean.slice(0,600)+'...':clean;
  const u=new SpeechSynthesisUtterance(snippet);
  u.rate=0.93; u.pitch=1.1; u.volume=1;
  const best=voices.find(v=>/samantha|karen|victoria|fiona|moira|ava|zoe/i.test(v.name))
    ||voices.find(v=>v.lang.startsWith('en')&&/female|woman/i.test(v.name))
    ||voices.find(v=>v.lang.startsWith('en'))||voices[0];
  if(best) u.voice=best;
  u.onstart=()=>{ 
    setStatus('Aria is speaking…','ok');
    // Mouth animation
    if(typeof speakAnim==='function') speakAnim(true);
  };
  u.onend=()=>{
    if(typeof speakAnim==='function') speakAnim(false);
    setStatus('Aria is ready','ok');
    if(voiceLoopActive&&voiceOn) setTimeout(()=>startMic(),600);
  };
  speechSynthesis.speak(u);
}

function toggleVoice(){
  voiceOn=!voiceOn;
  voiceLoopActive=voiceOn;
  updateVoiceBtn();
  if(!voiceOn){ speechSynthesis.cancel(); stopMouthAnim(); stopMic(); }
  else{ unlockAudio(); setTimeout(()=>startMic(),400); showNotif('🎤 Voice loop on!','ok'); }
}
function updateVoiceBtn(){
  const btn=document.getElementById('voice-btn');
  btn.textContent=voiceOn?'🔊':'🔇';
  btn.classList.toggle('active',voiceOn);
}

// ── SPEECH RECOGNITION ──
let recognition=null, isListening=false;
function toggleMic(){
  unlockAudio();
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    showNotif('Voice input not supported','err'); return;
  }
  if(isListening){ stopMic(true); return; }
  voiceLoopActive=voiceOn;
  startMic();
}
function startMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='en-US'; recognition.interimResults=true; recognition.continuous=false;
  recognition.onstart=()=>{
    isListening=true;
    document.getElementById('mic-btn').classList.add('mic-active');
    document.getElementById('mic-btn').textContent='⏹️';
    document.getElementById('wave-bars').classList.add('show');
    setStatus('Listening…','listening');
  };
  recognition.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('chat-input').value=t;
    autoResize(document.getElementById('chat-input'));
    if(e.results[e.results.length-1].isFinal){
      stopMic();
      setTimeout(()=>sendMessage(),300);
    }
  };
  recognition.onerror=()=>stopMic();
  recognition.onend=()=>{ if(isListening) stopMic(); };
  recognition.start();
}
function stopMic(manual=false){
  isListening=false;
  if(manual) voiceLoopActive=false;
  if(recognition){ try{recognition.stop();}catch(e){} }
  document.getElementById('mic-btn').classList.remove('mic-active');
  document.getElementById('mic-btn').textContent='🎤';
  document.getElementById('wave-bars').classList.remove('show');
  if(!isSpeaking) setStatus('Aria is ready','ok');
}

// ── NOTIF ──
let notifTimer;
function showNotif(msg,type='info'){
  const el=document.getElementById('notif');
  el.textContent=msg; el.className='notif show '+type;
  clearTimeout(notifTimer);
  notifTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

// ── CLEAR ──
function clearChat(){
  if(!confirm('Clear conversation with Aria?')) return;
  chatHistory=[];gameData=null;
  document.getElementById('game-badge').style.display='none';
  document.getElementById('msg-cloud').classList.remove('show');
  showNotif('Conversation cleared','info');
}

// Close panel on outside tap
document.addEventListener('click',e=>{
  const panel=document.getElementById('pgn-panel');
  const topBtn=document.querySelector('[title="Load PGN / Photo"]');
  if(panelOpen&&!panel.contains(e.target)&&e.target!==topBtn){
    panelOpen=false;
    panel.classList.remove('open');
  }
});
