<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/loaders/GLTFLoader.js';

// ——————————————— 3D ARIA ———————————————
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0e17);
const camera = new THREE.PerspectiveCamera(45, 500 / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 3.8);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(500, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.getElementById('puppet-3d').appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const keyLight = new THREE.DirectionalLight(0xfffaf0, 1.6);
keyLight.position.set(4, 6, 5);
scene.add(keyLight);

let model;
const loader = new GLTFLoader();
loader.load('aria.glb', gltf => {
  model = gltf.scene;
  scene.add(model);
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  model.position.set(-center.x, -center.y + size.y * 0.5 + 0.1, 0);
  model.scale.setScalar(1.15);
});

function ariaSetExpression(name, intensity = 1.0) {
  if (!model) return;
  model.traverse(child => {
    if (child.isMesh && child.morphTargetDictionary) {
      const i = child.morphTargetDictionary[name];
      if (i !== undefined) {
        child.morphTargetInfluences[i] = THREE.MathUtils.lerp(child.morphTargetInfluences[i] || 0, intensity, 0.3);
      }
    }
  });
}
window.ariaSetExpression = ariaSetExpression;

function animate() {
  requestAnimationFrame(animate);
  if (model) {
    model.rotation.y = Math.sin(Date.now() * 0.0008) * 0.04;
    model.position.y += Math.sin(Date.now() * 0.0012) * 0.0006;
  }
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w = document.getElementById('puppet-3d').clientWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// ——————————————— ELEVENLABS (iPad Safari fixed) ———————————————
const ELEVENLABS_KEY = "sk_9f8f33511a1acacb32bcd1a81436342ba41252153ddb48d6"; // ← PASTE YOUR KEY HERE
const VOICE_ID = "Icov0pR6jgWuaZhmlmtO";

let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  ctx.resume().then(() => audioUnlocked = true);
}
document.body.addEventListener('touchstart', unlockAudio, { once: true });
document.body.addEventListener('click', unlockAudio, { once: true });

async function ariaSpeak(text) {
  if (!text.trim()) return;
  const clean = text.replace(/\[.*?\]/g, "").trim();
  const emotion = text.match(/\[(.*?)\]/)?.[1] || 'Calm';
  
  ariaSetExpression('Speaking', 1.0); // Mouth starts instantly

  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}/stream`, {
      method: 'POST',
      headers: {
        'xi-api-key': ELEVENLABS_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        text: clean,
        model_id: "eleven_flash_v2_5",
        voice_settings: { stability: 0.75, similarity_boost: 0.9 }
      })
    });

    const arrayBuffer = await res.arrayBuffer();
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
    const source = audioContext.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(audioContext.destination);
    source.onended = () => ariaSetExpression(emotion === 'Speaking' ? 'Calm' : emotion, 1.0);
    source.start(0);
  } catch (e) {
    console.error("ElevenLabs error:", e);
    ariaSetExpression('Calm', 1.0);
  }
}

// ——————————————— STOCKFISH BRAIN ———————————————
let game = new Chess();
let board;
const brain = new Worker('stockfish.js');
brain.postMessage("uci"); brain.postMessage("isready");

brain.onmessage = e => {
  if (e.data.includes('score cp')) {
    const score = parseInt(e.data.match(/score cp (-?\d+)/)[1]) / 100;
    const response = score > 1.5 ? "Impressive [happy]"
                   : score < -1.5 ? "You're in trouble [playful]"
                   : "Interesting [calm]";
    ariaSpeak(response);
  }
};

function onDrop(source, target) {
  const move = game.move({from: source, to: target, promotion: 'q'});
  if (!move) return 'snapback';
  board.position(game.fen());
  ariaSetExpression('Thinking', 1.0);
  brain.postMessage(`position fen ${game.fen()}`);
  brain.postMessage("go depth 16");
}

// Init
board = Chessboard('board', { draggable:true, position:'start', onDrop });
function newGame() { game.reset(); board.start(); ariaSpeak("New game. Let’s go [calm]"); }
newGame();
ariaSpeak("Hey cutie. I’m Aria. Your move.");
</script>
