<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria Engine</title>

<style>
  body {
    margin: 0;
    background: #0b0e17;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  #puppet-3d {
    width: 100vw;
    height: 100vh;
  }

  #status {
    position: fixed;
    top: 10px;
    left: 10px;
    color: #00ff88;
    background: rgba(0,0,0,0.7);
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 6px;
    z-index: 100;
  }
</style>
</head>

<body>

<div id="status">Starting...</div>
<div id="puppet-3d"></div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

const status = document.getElementById('status');

let model;

// ---------------- SCENE ----------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0e17);

// ---------------- CAMERA ----------------
const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 1.2, 3);

// ---------------- RENDERER ----------------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

document.getElementById('puppet-3d').appendChild(renderer.domElement);

// ---------------- LIGHTING ----------------
scene.add(new THREE.AmbientLight(0xffffff, 1.3));

const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(5, 5, 5);
scene.add(light);

// ---------------- LOADER ----------------
const loader = new GLTFLoader();

status.innerText = "Connecting to aria.glb...";

loader.load(
  "aria.glb",

  // SUCCESS
  (gltf) => {
    model = gltf.scene;
    scene.add(model);

    status.innerText = "Model Loaded ✅";

    // Center model
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());

    model.position.sub(center);
    model.position.y = 0;

    // Scale up
    model.scale.setScalar(1.5);
  },

  // PROGRESS
  (xhr) => {
    if (xhr.lengthComputable) {
      const percent = Math.round((xhr.loaded / xhr.total) * 100);
      status.innerText = "Loading: " + percent + "%";
    } else {
      status.innerText = "Loading...";
    }
  },

  // ERROR
  (error) => {
    console.error(error);
    status.style.color = "red";
    status.innerText = "ERROR: aria.glb not found ❌";
  }
);

// ---------------- ANIMATION ----------------
function animate() {
  requestAnimationFrame(animate);

  if (model) {
    model.rotation.y += 0.003;
  }

  renderer.render(scene, camera);
}
animate();

// ---------------- RESIZE ----------------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
