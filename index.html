<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria</title>

<style>
  body {
    margin: 0;
    background: #0b0e17;
    overflow: hidden;
  }

  #puppet-3d {
    width: 100vw;
    height: 100vh;
  }

  canvas {
    display: block;
  }
</style>
</head>

<body>
<div id="puppet-3d"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/loaders/GLTFLoader.js"></script>

<script>
let model;
let headBoneRef = null;
let leftEyeRef = null;
let rightEyeRef = null;

let gazeTarget = new THREE.Vector3(0, 1.5, 5);

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0e17);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 3.5);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(1);
document.getElementById('puppet-3d').appendChild(renderer.domElement);

// LIGHTS
scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(4,5,4);
scene.add(light);

// 🎨 ANIME EYE CREATOR
function createAnimeEye() {
  const eyeGroup = new THREE.Group();

  const white = new THREE.Mesh(
    new THREE.SphereGeometry(0.03, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  white.scale.set(1,1.2,0.5);
  eyeGroup.add(white);

  const iris = new THREE.Mesh(
    new THREE.CircleGeometry(0.02, 32),
    new THREE.MeshBasicMaterial({ color: 0x3366ff })
  );
  iris.position.z = 0.016;
  eyeGroup.add(iris);

  const glint = new THREE.Mesh(
    new THREE.CircleGeometry(0.007, 16),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  glint.position.set(0.008,0.008,0.017);
  eyeGroup.add(glint);

  return eyeGroup;
}

// 📦 LOAD MODEL
const loader = new THREE.GLTFLoader();
loader.load('aria.glb', gltf => {
  model = gltf.scene;
  scene.add(model);

  // REMOVE OLD EYES
  model.traverse(node => {
    if (node.name && node.name.includes('ariaEye')) {
      if (node.parent) node.parent.remove(node);
    }
  });

  // CREATE EYES
  const leftEye = createAnimeEye();
  const rightEye = createAnimeEye();

  leftEye.name = "ariaEye_left";
  rightEye.name = "ariaEye_right";

  // FIND HEAD BONE
  let headBone = null;
  model.traverse(node => {
    if (node.isBone && !headBone) {
      const n = node.name.toLowerCase();
      if (n.includes('head') || n.includes('neck') || n.includes('face')) {
        headBone = node;
      }
    }
  });

  if (headBone) {
    headBone.add(leftEye);
    headBone.add(rightEye);

    leftEye.position.set(-0.062, 0.105, 0.082);
    rightEye.position.set(0.062, 0.105, 0.082);

    leftEye.scale.set(0.8,0.8,0.8);
    rightEye.scale.set(0.8,0.8,0.8);

    headBoneRef = headBone;
    leftEyeRef = leftEye;
    rightEyeRef = rightEye;
  } else {
    model.add(leftEye);
    model.add(rightEye);
  }

  // CENTER MODEL
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  model.position.set(-center.x, 0, 0);
  model.scale.setScalar(1.2);
});

// 🎯 GAZE SYSTEM
function updateGaze() {
  if (leftEyeRef && rightEyeRef) {
    leftEyeRef.lookAt(gazeTarget);
    rightEyeRef.lookAt(gazeTarget);
  }
}

// 🧠 MOUSE TRACK (Simulates user focus)
window.addEventListener('mousemove', e => {
  const x = (e.clientX / window.innerWidth - 0.5) * 2;
  const y = (e.clientY / window.innerHeight - 0.5) * 2;

  gazeTarget.set(x, 1.5 - y, 5);
});

// 🎬 ANIMATION LOOP
function animate() {
  requestAnimationFrame(animate);

  const t = Date.now();

  if (model) {
    model.rotation.y = Math.sin(t * 0.0008) * 0.04;
  }

  if (headBoneRef && leftEyeRef && rightEyeRef) {
    // HEAD SYNC
    leftEyeRef.rotation.x = headBoneRef.rotation.x * 0.2;
    rightEyeRef.rotation.x = headBoneRef.rotation.x * 0.2;

    // MICRO BLINK
    const pulse = Math.abs(Math.sin(t * 0.003));
    const scaleY = 0.8 * (1 - pulse * 0.05);
    leftEyeRef.scale.y = scaleY;
    rightEyeRef.scale.y = scaleY;

    updateGaze();
  }

  renderer.render(scene, camera);
}
animate();

// 📱 RESIZE FIX
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
