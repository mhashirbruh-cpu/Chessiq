<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChessIQ - Chess Analysis Tool</title>
    <!-- Chart.js for evaluation graph -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <!-- Chess.js for game logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080810;
            --s1: #0e0e1a;
            --s2: #151524;
            --s3: #1c1c2e;
            --border: #252538;
            --accent: #7c6fff;
            --green: #4fffb0;
            --yellow: #ffe066;
            --orange: #ff9a3c;
            --red: #ff4757;
            --blue: #48dbfb;
            --text: #e2e2f0;
            --text2: #6b6b8a;
            --text3: #9898b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            background: rgba(8, 8, 16, .97);
            flex-shrink: 0;
        }

        .logo {
            font-weight: 800;
            font-size: 17px;
            letter-spacing: -.5px;
        }

        .logo em {
            color: var(--accent);
            font-style: normal;
        }

        .hbtns {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 5px 12px;
            border-radius: 7px;
            border: none;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 11px;
            transition: all 0.2s;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text3);
        }

        .btn-ghost:active {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:active {
            opacity: 0.8;
        }

        .btn-danger {
            background: var(--red);
            color: #fff;
        }

        .topnav {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--s1);
            flex-shrink: 0;
        }

        .tnav {
            flex: 1;
            padding: 9px 4px;
            border: none;
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 11px;
            border-bottom: 2px solid transparent;
            text-align: center;
            transition: all 0.2s;
        }

        .tnav.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .page {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        .page.active {
            display: flex;
        }

        /* Board Page */
        .board-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding: 10px 8px 24px;
            gap: 10px;
            background: var(--s1);
        }

        .board-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 520px;
        }

        .flip-btn {
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--s2);
            color: var(--text3);
            cursor: pointer;
            font-size: 11px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
        }

        .flip-btn:active {
            border-color: var(--accent);
            color: var(--accent);
        }

        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            border: 3px solid #2a2a3f;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, .7), 0 0 0 1px rgba(124, 111, 255, .2);
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .sq {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .sq.light {
            background: #f0d9b5;
        }

        .sq.dark {
            background: #b58863;
        }

        .sq.sel {
            background: #7c6fff !important;
        }

        .sq.lastm-l {
            background: #cdd26a !important;
        }

        .sq.lastm-d {
            background: #aaa23a !important;
        }

        .sq.bestfrom {
            background: #52be80 !important;
        }

        .sq.bestto {
            background: #27ae60 !important;
        }

        .sq.legal::after {
            content: '';
            position: absolute;
            width: 32%;
            height: 32%;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }

        .sq.legal-cap::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 5px solid rgba(0, 0, 0, 0.18);
            border-radius: 2px;
            pointer-events: none;
        }

        .files-row {
            display: flex;
            width: 100%;
            max-width: 520px;
        }

        .files-row span {
            flex: 1;
            text-align: center;
            font-size: 10px;
            color: var(--text2);
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
        }

        .bcontrols {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .nbtn {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--s2);
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .nbtn:active {
            border-color: var(--accent);
            color: var(--accent);
        }

        .mctr {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            color: var(--text2);
            min-width: 52px;
            text-align: center;
        }

        .depth-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 9px 13px;
            width: 100%;
            max-width: 520px;
        }

        .dlbl {
            font-size: 11px;
            color: var(--text2);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        input[type=range] {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .dval {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            color: var(--accent);
            font-weight: 700;
            min-width: 24px;
            text-align: right;
        }

        .eval-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 10px 14px;
            width: 100%;
            max-width: 520px;
        }

        .eval-bar {
            width: 12px;
            height: 68px;
            border-radius: 6px;
            background: var(--s3);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
            flex-shrink: 0;
        }

        .eval-w {
            background: #e0e0e0;
            width: 100%;
            transition: height .5s;
            height: 50%;
        }

        .eval-num {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .eval-lbl {
            font-size: 11px;
            color: var(--text2);
            margin-top: 2px;
        }

        .bm-box {
            margin-left: auto;
            text-align: right;
        }

        .bm-lbl {
            font-size: 10px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: .8px;
        }

        .bm-val {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            color: var(--green);
            margin-top: 2px;
        }

        /* Analysis Page */
        .analysis-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .ptabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--s1);
            flex-shrink: 0;
        }

        .ptab {
            flex: 1;
            padding: 10px 4px;
            border: none;
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 11px;
            border-bottom: 2px solid transparent;
            text-align: center;
            transition: all 0.2s;
        }

        .ptab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .pcontent {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
        }

        .pview {
            display: none;
        }

        .pview.active {
            display: block;
        }

        .card {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .sec-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text2);
            margin-bottom: 9px;
        }

        textarea {
            width: 100%;
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 10px;
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            resize: vertical;
            outline: none;
            min-height: 80px;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        textarea::placeholder {
            color: var(--text2);
        }

        .pgn-btns {
            display: flex;
            gap: 7px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .statusbar {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 12px 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sdot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text2);
            flex-shrink: 0;
        }

        .sdot.spin-mode {
            background: var(--yellow);
            animation: pulse 1s infinite;
        }

        .sdot.done {
            background: var(--green);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .2; }
        }

        .stxt {
            font-size: 12px;
            color: var(--text2);
            flex: 1;
        }

        .stxt strong {
            color: var(--text);
        }

        .prog-out {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            flex: 1;
            max-width: 120px;
        }

        .prog-in {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--blue));
            border-radius: 2px;
            transition: width .3s;
            width: 0;
        }

        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            color: var(--text2);
            gap: 10px;
        }

        .empty-ico {
            font-size: 44px;
            opacity: .15;
        }

        .empty h3 {
            font-size: 15px;
            color: var(--text3);
        }

        .empty p {
            font-size: 12px;
            line-height: 1.6;
            max-width: 260px;
        }

        .move-grid {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .mrow {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .mnum {
            min-width: 26px;
            padding: 5px 6px;
            background: var(--s1);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--text2);
            text-align: right;
            border-radius: 4px;
        }

        .mcell {
            flex: 1;
            padding: 6px 9px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 5px;
            background: var(--s1);
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .mcell:active {
            background: var(--s2);
        }

        .mcell.active {
            background: rgba(124, 111, 255, .12);
            border-color: var(--accent);
        }

        .msan {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
        }

        .mann {
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 3px;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
        }

        .a-br { background: rgba(124, 111, 255, .2); color: var(--accent); }
        .a-be { background: rgba(79, 255, 176, .2); color: var(--green); }
        .a-go { background: rgba(72, 219, 251, .2); color: var(--blue); }
        .a-in { background: rgba(255, 224, 102, .2); color: var(--yellow); }
        .a-mi { background: rgba(255, 154, 60, .2); color: var(--orange); }
        .a-bl { background: rgba(255, 71, 87, .2); color: var(--red); }

        .sum-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .scard {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 13px 14px;
        }

        .scard-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text2);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .cdot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .acc-big {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .acc-bar {
            height: 4px;
            border-radius: 3px;
            background: var(--s3);
            overflow: hidden;
            margin-bottom: 7px;
        }

        .acc-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--red), var(--yellow), var(--green));
            transition: width .8s;
        }

        .qrow {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            padding: 2px 0;
        }

        .qlbl {
            color: var(--text2);
        }

        .qval {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
        }

        .graph-card {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .graph-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text2);
            margin-bottom: 12px;
        }

        .elines {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 13px;
            margin-bottom: 10px;
        }

        .eline {
            display: flex;
            gap: 8px;
            padding: 7px 0;
            border-bottom: 1px solid var(--border);
            align-items: flex-start;
        }

        .eline:last-child {
            border-bottom: none;
        }

        .erank {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--text2);
            min-width: 14px;
            padding-top: 2px;
        }

        .eeval {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            min-width: 44px;
            padding-top: 2px;
        }

        .eeval.pos { color: var(--green); }
        .eeval.neg { color: var(--red); }
        .eeval.eq { color: var(--text2); }

        .emoves {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--text);
            line-height: 1.6;
            flex: 1;
            word-break: break-word;
        }

        /* Library Page */
        .library-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .lib-head {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--s1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .lib-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text2);
        }

        .lib-cnt {
            background: var(--s3);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 1px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-family: 'IBM Plex Mono', monospace;
        }

        .lib-search {
            padding: 10px 12px;
            border
