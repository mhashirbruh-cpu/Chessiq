<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria Engine</title>

<style>
body {
  margin: 0;
  background: #0b0e17;
  overflow: hidden;
  font-family: sans-serif;
}

#puppet-3d {
  width: 100vw;
  height: 100vh;
}

#status {
  position: fixed;
  top: 10px;
  left: 10px;
  color: #00ff00;
  background: rgba(0,0,0,0.6);
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 6px;
  z-index: 100;
}
</style>
</head>

<body>

<div id="status">System: Starting...</div>
<div id="puppet-3d"></div>

<!-- NON-MODULE VERSION (STABLE FOR IPAD) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
const status = document.getElementById('status');

let model;
let leftEyeRef, rightEyeRef;
let gazeTarget = new THREE.Vector3(0, 1.5, 5);

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0e17);

// CAMERA
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.4, 2.5);

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(1);
document.getElementById('puppet-3d').appendChild(renderer.domElement);

// LIGHTING
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(5,5,5);
scene.add(light);

// EYE FUNCTION
function createAnimeEye() {
  const g = new THREE.Group();

  const white = new THREE.Mesh(
    new THREE.SphereGeometry(0.03, 24, 24),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  white.scale.set(1,1.2,0.4);
  g.add(white);

  const iris = new THREE.Mesh(
    new THREE.CircleGeometry(0.022, 32),
    new THREE.MeshBasicMaterial({ color: 0x3366ff })
  );
  iris.position.z = 0.015;
  g.add(iris);

  return g;
}

// LOAD MODEL
const loader = new THREE.GLTFLoader();

status.innerText = "Loading aria.glb...";

loader.load(
  "aria.glb",

  function (gltf) {
    model = gltf.scene;
    scene.add(model);

    status.innerText = "Aria Loaded ✅";

    // CENTER MODEL
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);

    // CREATE EYES
    leftEyeRef = createAnimeEye();
    rightEyeRef = createAnimeEye();

    model.add(leftEyeRef);
    model.add(rightEyeRef);

    // POSITION (TUNE IF NEEDED)
    leftEyeRef.position.set(-0.065, 1.55, 0.15);
    rightEyeRef.position.set(0.065, 1.55, 0.15);
  },

  function (progress) {
    if (progress.total) {
      const percent = Math.round((progress.loaded / progress.total) * 100);
      status.innerText = "Loading " + percent + "%";
    }
  },

  function (error) {
    console.error(error);
    status.style.color = "red";
    status.innerText = "ERROR loading model ❌";
  }
);

// ANIMATION
function animate() {
  requestAnimationFrame(animate);

  const t = Date.now();

  if (model) {
    model.rotation.y = Math.sin(t * 0.001) * 0.03;
  }

  if (leftEyeRef && rightEyeRef) {
    // LOOK AT USER
    leftEyeRef.lookAt(gazeTarget);
    rightEyeRef.lookAt(gazeTarget);

    // BLINK
    const blink = Math.abs(Math.sin(t * 0.002)) > 0.98 ? 0.1 : 1;

    leftEyeRef.scale.y += (blink - leftEyeRef.scale.y) * 0.2;
    rightEyeRef.scale.y += (blink - rightEyeRef.scale.y) * 0.2;
  }

  renderer.render(scene, camera);
}
animate();

// MOUSE
window.addEventListener("mousemove", function(e){
  gazeTarget.x = (e.clientX / window.innerWidth - 0.5) * 3;
  gazeTarget.y = 1.5 - (e.clientY / window.innerHeight - 0.5) * 3;
});

// TOUCH (IMPORTANT FOR IPHONE/IPAD)
window.addEventListener("touchmove", function(e){
  const t = e.touches[0];
  gazeTarget.x = (t.clientX / window.innerWidth - 0.5) * 3;
  gazeTarget.y = 1.5 - (t.clientY / window.innerHeight - 0.5) * 3;
});

// RESIZE
window.addEventListener("resize", function(){
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
