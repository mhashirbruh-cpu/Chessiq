<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChessIQ - Enhanced</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            color: white;
        }
        
        h1 {
            margin: 10px 0;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }
        
        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            border: 4px solid #2c3e50;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1;
        }
        
        .sq {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: background-color 0.2s;
        }
        
        .sq.light {
            background: #f0d9b5;
        }
        
        .sq.dark {
            background: #b58863;
        }
        
        .sq.sel {
            background: #7b61ff !important;
        }
        
        .sq.lastm-l {
            background: #f5f682 !important;
        }
        
        .sq.lastm-d {
            background: #b5cf63 !important;
        }
        
        .sq.legal {
            background: rgba(123, 97, 255, 0.4) !important;
        }
        
        .sq.legal::after {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
        }
        
        .sq.legal-cap {
            background: rgba(231, 76, 60, 0.5) !important;
        }
        
        .sq.legal-cap::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 4px solid rgba(0,0,0,0.2);
            border-radius: 2px;
        }
        
        .piece {
            width: 90%;
            height: 90%;
            pointer-events: none;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
            transition: transform 0.15s ease-out;
        }
        
        .piece:hover {
            transform: scale(1.05);
        }
        
        #controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        
        button:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0,0,0,0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }
        
        #status {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 500;
            text-align: center;
            backdrop-filter: blur(10px);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #pgnInput {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.9);
            color: #2c3e50;
            font-size: 14px;
        }
        
        .sound-toggle {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            z-index: 1000;
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 24px; }
            button { padding: 10px 18px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="sound-toggle" onclick="toggleSound()" id="soundBtn">🔊</div>
    
    <h1>♔ ChessIQ ♚</h1>
    
    <div id="gameContainer">
        <div id="status">White to move</div>
        
        <div id="chessboard"></div>
        
        <div id="controls">
            <button onclick="newGame()">New Game</button>
            <button onclick="undoMove()">Undo</button>
            <button onclick="flipBoard()">Flip Board</button>
            <button onclick="analyzeGame()" id="analyzeBtn">Analyze</button>
        </div>
        
        <div>
            <input type="text" id="pgnInput" placeholder="Paste PGN here...">
            <button onclick="loadPGN()">Load PGN</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script>
        // High-quality SVG pieces (classic Staunton design)
        const PIECE_SVG = {

            'bK': '<svg viewBox="0 0 45 45" xmlns="http://www.w3.org/2000/svg"><g fill="none" fill-rule="evenodd" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22.5 11.63V6M20 8h5" stroke-linejoin="miter"/><path d="M22.5 25s4.5-7.5 3-10.5c0 0-1-2.5-3-2.5s-3 2.5-3 2.5c-1.5 3 3 10.5 3 10.5" fill="#000" stroke-linecap="butt"/><path d="M11.5 37c5.5 3.5 15.5 3.5 21 0v-7s9-4.5 6-10.5c-4-1-5 2-8 2s-4-1-9-1-6 2-9 1-4-3-8-2c-3 6 6 10.5 6 10.5v7" fill="#000"/><path d="M11.5 30c5.5-3 15.5-3 21 0m-21 3.5c5.5-3 15.5-3 21 0m-21 3.5c5.5-3 15.5-3 21 0" stroke="#fff"/></g></svg>',

            'bB': '<svg viewBox="0 0 45 45" xmlns="http://www.w3.org/2000/svg"><g fill="none" fill-rule="evenodd" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><g fill="#000" stroke-linecap="butt"><path d="M9 36c3.39-.97 9.11-1.45 13.5-1.45 4.38 0 10.11.48 13.5 1.45V30c0-2.59-7.08-4.5-13.5-4.5S9 27.41 9 30v6z"/><path d="M15 32c2.5 2.5 12.5 2.5 15 0 .5-1.5 0-2 0-2 0-2.5-2.5-4-2.5-4 5.5-1.5 6-11.5-5-15.5-11 4-10.5 14-5 15.5 0 0-2.5 1.5-2.5 4 0 0-.5.5 0 2z"/><path d="M25 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 1 1 5 0z"/></g><path d="M17.5 26h10M15 30h15m-7.5-14.5v5M20 18h5" stroke="#fff" stroke-linejoin="miter"/></g></svg>',
            'bN': '<svg viewBox="0 0 45 45" xmlns="http://www.w3.org/2000/svg"><g fill="none" fill-rule="evenodd" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10c10.5 1 16.5 8 16 29H15c0-9 10-6.5 8-21" fill="#000"/><path d="M24 18c.38 2.91-5.55 7.37-8 9-3 2-2.82 4.34-5 4-1.042-.94 1.41-3.04 0-3-1 0 .19 1.23-1 2-1 0-4.003 1-4-4 0-2 6-12 6-12s1.89-1.9 2-3.5c-.73-.994-.5-2-.5-3 1-1 3 2.5 3 2.5h2s.78-1.992 2.5-3c1 0 1 3 1 3" fill="#000"/><path d="M9.5 25.5A.5.5 0 1 1 9 25a.5.5 0 0 1 .5.5z" fill="#fff"/><path d="M15 15.5a.5 1.5 0 1 1-1 0 .5 1.5 0 1 1 1 0z" fill="#000" stroke="#fff"/></g></svg>',
            'bP': '<svg viewBox="0 0 45 45" xmlns="http://www.w3.org/2000/svg"><path d="M22.5 9c-2.21 0-4 1.79-4 4 0 .89.29 1.71.78 2.38C17.33 16.5 16 18.59 16 21c0 2.03.94 3.84 2.41 5.03-3 1.06-7.41 5.55-7.41 13.47h23c0-7.92-4.41-12.41-7.41-13.47 1.47-1.19 2.41-3 2.41-5.03 0-2.41-1.33-4.5-3.28-5.62.49-.67.78-1.49.78-2.38 0-2.21-1.79-4-4-4z" fill="#000" stroke="#000" stroke-width="1.5" stroke-linecap="round"/></svg>'
        };

        // Sound effects using Web Audio API
        let soundEnabled = true;
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        // Create sound effects
        const sounds = {
            move: null,
            capture: null,
            castle: null,
            promote: null,
            check: null
        };
        
        function createMoveSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        }
        
        function createCaptureSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(150, audioContext.currentTime + 0.15);
            
            gainNode.gain.setValueAtTime(0.4, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.15);
        }
        
        function createCastleSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(150, audioContext.currentTime);
            oscillator.frequency.linearRampToValueAtTime(250, audioContext.currentTime + 0.1);
            oscillator.frequency.linearRampToValueAtTime(150, audioContext.currentTime + 0.2);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }
        
        function createPromoteSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(600, audioContext.currentTime + 0.2);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }
        
        function createCheckSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(300, audioContext.currentTime + 0.3);
            
            gainNode.gain.setValueAtTime(0.4, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }
        
        function playSound(type) {
            if (!soundEnabled) return;
            
            // Resume audio context if suspended (browser autoplay policy)
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            switch(type) {
                case 'move': createMoveSound(); break;
                case 'capture': createCaptureSound(); break;
                case 'castle': createCastleSound(); break;
                case 'promote': createPromoteSound(); break;
                case 'check': createCheckSound(); break;
            }
        }
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
        }

        // Game state
        let game = new Chess();
        let selectedSquare = null;
        let legalMoves = [];
        let lastMove = null;
        let flipped = false;

        function renderBoard() {
            const board = document.getElementById('chessboard');
            board.innerHTML = '';
            
            const files = flipped ? ['h','g','f','e','d','c','b','a'] : ['a','b','c','d','e','f','g','h'];
            const ranks = flipped ? [1,2,3,4,5,6,7,8] : [8,7,6,5,4,3,2,1];
            
            for (let r = 0; r < 8; r++) {
                for (let f = 0; f < 8; f++) {
                    const square = files[f] + ranks[r];
                    const sqDiv = document.createElement('div');
                    const isLight = (f + r) % 2 === 0;
                    
                    sqDiv.className = `sq ${isLight ? 'light' : 'dark'}`;
                    sqDiv.dataset.square = square;
                    
                    // Highlight last move
                    if (lastMove) {
                        if (square === lastMove.from || square === lastMove.to) {
                            sqDiv.classList.add(isLight ? 'lastm-l' : 'lastm-d');
                        }
                    }
                    
                    // Highlight selected square
                    if (selectedSquare === square) {
                        sqDiv.classList.add('sel');
                    }
                    
                    // Show legal moves
                    if (legalMoves.includes(square)) {
                        const piece = game.get(square);
                        sqDiv.classList.add(piece ? 'legal-cap' : 'legal');
                    }
                    
                    // Add piece
                    const piece = game.get(square);
                    if (piece) {
                        const pieceKey = piece.color + piece.type.toUpperCase();
                        sqDiv.innerHTML = PIECE_SVG[pieceKey];
                        const svg = sqDiv.querySelector('svg');
                        if (svg) {
                            svg.classList.add('piece');
                        }
                    }
                    
                    sqDiv.addEventListener('click', () => handleSquareClick(square));
                    sqDiv.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        handleSquareClick(square);
                    });
                    
                    board.appendChild(sqDiv);
                }
            }
            
            updateStatus();
        }

        function handleSquareClick(square) {
            // If a square is already selected
            if (selectedSquare) {
                // If clicking on a legal move square, make the move
                if (legalMoves.includes(square)) {
                    const move = game.move({
                        from: selectedSquare,
                        to: square,
                        promotion: 'q' // Always promote to queen for simplicity
                    });
                    
                    if (move) {
                        lastMove = move;
                        
                        // Determine sound type
                        if (move.flags.includes('c')) {
                            playSound('capture');
                        } else if (move.flags.includes('e')) {
                            playSound('castle');
                        } else if (move.flags.includes('p')) {
                            playSound('promote');
                        } else {
                            playSound('move');
                        }
                        
                        // Check for check
                        if (game.in_check()) {
                            setTimeout(() => playSound('check'), 100);
                        }
                        
                        selectedSquare = null;
                        legalMoves = [];
                        renderBoard();
                    }
                } else {
                    // Deselect or select a different piece
                    const piece = game.get(square);
                    if (piece && piece.color === game.turn()) {
                        selectedSquare = square;
                        const moves = game.moves({ square: square, verbose: true });
                        legalMoves = moves.map(m => m.to);
                    } else {
                        selectedSquare = null;
                        legalMoves = [];
                    }
                    renderBoard();
                }
            } else {
                // Select a piece
                const piece = game.get(square);
                if (piece && piece.color === game.turn()) {
                    selectedSquare = square;
                    const moves = game.moves({ square: square, verbose: true });
                    legalMoves = moves.map(m => m.to);
                    renderBoard();
                }
            }
        }

        function updateStatus() {
            const status = document.getElementById('status');
            let text = '';
            
            if (game.game_over()) {
                if (game.in_checkmate()) {
                    text = `Checkmate! ${game.turn() === 'w' ? 'Black' : 'White'} wins!`;
                } else if (game.in_draw()) {
                    text = 'Draw!';
                } else if (game.in_stalemate()) {
                    text = 'Stalemate!';
                }
            } else {
                text = `${game.turn() === 'w' ? 'White' : 'Black'} to move`;
                if (game.in_check()) {
                    text += ' - CHECK!';
                }
            }
            
            status.textContent = text;
        }

        function newGame() {
            game.reset();
            selectedSquare = null;
            legalMoves = [];
            lastMove = null;
            renderBoard();
        }

        function undoMove() {
            game.undo();
            selectedSquare = null;
            legalMoves = [];
            lastMove = game.history({ verbose: true }).pop();
            renderBoard();
        }

        function flipBoard() {
            flipped = !flipped;
            renderBoard();
        }

        function loadPGN() {
            const pgn = document.getElementById('pgnInput').value;
            if (pgn && game.load_pgn(pgn)) {
                const history = game.history({ verbose: true });
                lastMove = history[history.length - 1];
                renderBoard();
            }
        }

        function analyzeGame() {
            alert('Analysis feature coming soon! This would integrate with the Stockfish engine.');
        }

        // Initialize
        renderBoard();
    </script>
</body>
</html>
