<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria Engine v2</title>

<style>
  body {
    margin: 0;
    background: #0b0e17;
    overflow: hidden;
    font-family: sans-serif;
  }

  #puppet-3d {
    width: 100vw;
    height: 100vh;
  }

  #status {
    position: fixed;
    top: 10px;
    left: 10px;
    color: #00ff00;
    background: rgba(0,0,0,0.7);
    padding: 6px 10px;
    font-size: 12px;
    z-index: 100;
    border-radius: 4px;
  }
</style>
</head>

<body>

<div id="status">System: Booting...</div>
<div id="puppet-3d"></div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

const status = document.getElementById('status');

let model;
let headBoneRef;
let leftEyeRef;
let rightEyeRef;

let gazeTarget = new THREE.Vector3(0, 1.5, 5);

status.innerText = "System: Three.js Loaded ✅";

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0e17);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.2, 3);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

document.getElementById('puppet-3d').appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 1.0));

const light = new THREE.DirectionalLight(0xffffff, 1.2);
light.position.set(5,5,5);
scene.add(light);

// EYE CREATOR
function createEye() {
  const group = new THREE.Group();

  const white = new THREE.Mesh(
    new THREE.SphereGeometry(0.03, 24, 24),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  white.scale.set(1,1.2,0.4);
  group.add(white);

  const iris = new THREE.Mesh(
    new THREE.CircleGeometry(0.022, 32),
    new THREE.MeshBasicMaterial({ color: 0x3366ff })
  );
  iris.position.z = 0.015;
  group.add(iris);

  const glint = new THREE.Mesh(
    new THREE.CircleGeometry(0.007, 16),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  glint.position.set(0.008,0.008,0.016);
  group.add(glint);

  return group;
}

// LOAD MODEL
const loader = new GLTFLoader();

status.innerText = "System: Loading aria.glb...";

loader.load(
  './aria.glb', // IMPORTANT: must match EXACT filename
  (gltf) => {
    console.log("MODEL LOADED");
    status.innerText = "System: Model Loaded ✅";

    model = gltf.scene;
    scene.add(model);

    // FIND HEAD
    let headBone = null;

    model.traverse(node => {
      if (node.isBone && !headBone) {
        const n = node.name.toLowerCase();
        if (n.includes('head') || n.includes('neck') || n.includes('face')) {
          headBone = node;
        }
      }
    });

    // CREATE EYES
    leftEyeRef = createEye();
    rightEyeRef = createEye();

    if (headBone) {
      status.innerText = "System: Head Bone Found ✅";

      headBone.add(leftEyeRef);
      headBone.add(rightEyeRef);

      leftEyeRef.position.set(-0.065, 0.1, 0.08);
      rightEyeRef.position.set(0.065, 0.1, 0.08);

      headBoneRef = headBone;
    } else {
      status.innerText = "WARNING: No head bone";
      model.add(leftEyeRef);
      model.add(rightEyeRef);
    }

    // CENTER MODEL
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.set(-center.x, 0, 0);
    model.scale.setScalar(1.2);
  },

  (xhr) => {
    if (xhr.total) {
      const p = Math.round(xhr.loaded / xhr.total * 100);
      status.innerText = "Loading: " + p + "%";
    }
  },

  (err) => {
    console.error(err);
    status.style.color = "red";
    status.innerText = "ERROR: aria.glb not found ❌";
  }
);

// ANIMATION
function animate() {
  requestAnimationFrame(animate);

  const t = Date.now();

  if (model) {
    model.rotation.y = Math.sin(t * 0.001) * 0.03;
  }

  if (leftEyeRef && rightEyeRef) {
    leftEyeRef.lookAt(gazeTarget);
    rightEyeRef.lookAt(gazeTarget);

    // blink
    const blink = Math.abs(Math.sin(t * 0.002)) > 0.98 ? 0.1 : 1;
    leftEyeRef.scale.y = THREE.MathUtils.lerp(leftEyeRef.scale.y, blink, 0.2);
    rightEyeRef.scale.y = THREE.MathUtils.lerp(rightEyeRef.scale.y, blink, 0.2);
  }

  renderer.render(scene, camera);
}
animate();

// MOUSE TRACK
window.addEventListener('mousemove', e => {
  gazeTarget.x = (e.clientX / window.innerWidth - 0.5) * 3;
  gazeTarget.y = 1.5 - (e.clientY / window.innerHeight - 0.5) * 3;
});

// RESIZE
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
